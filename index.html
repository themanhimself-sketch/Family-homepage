<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Family">
<meta name="theme-color" content="#f2f2f7">
<title>Family Homepage</title>
<style>
/* ── iOS SYSTEM TOKENS ── */
:root {
  --sys-bg:          #f2f2f7;
  --sys-bg2:         #ffffff;
  --sys-bg3:         #f2f2f7;
  --sys-grouped-bg:  #f2f2f7;
  --sys-fill:        rgba(120,120,128,0.12);
  --sys-fill2:       rgba(120,120,128,0.08);
  --label:           #000000;
  --label2:          rgba(60,60,67,0.6);
  --label3:          rgba(60,60,67,0.3);
  --label4:          rgba(60,60,67,0.18);
  --separator:       rgba(60,60,67,0.29);
  --sep-opaque:      #c6c6c8;
  --blue:            #007aff;
  --green:           #34c759;
  --orange:          #ff9500;
  --red:             #ff3b30;
  --purple:          #af52de;
  --teal:            #5ac8fa;
  --navbar-bg:       rgba(242,242,247,0.85);
  --tabbar-bg:       rgba(249,249,249,0.94);
  --card-bg:         #ffffff;
  --safe-t:          env(safe-area-inset-top, 44px);
  --safe-b:          env(safe-area-inset-bottom, 0px);
  --font:            -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  --font-display:    -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --sys-bg:         #000000;
    --sys-bg2:        #1c1c1e;
    --sys-bg3:        #2c2c2e;
    --sys-grouped-bg: #000000;
    --sys-fill:       rgba(120,120,128,0.36);
    --sys-fill2:      rgba(120,120,128,0.24);
    --label:          #ffffff;
    --label2:         rgba(235,235,245,0.6);
    --label3:         rgba(235,235,245,0.3);
    --label4:         rgba(235,235,245,0.18);
    --separator:      rgba(84,84,88,0.65);
    --sep-opaque:     #38383a;
    --blue:           #0a84ff;
    --green:          #30d158;
    --orange:         #ff9f0a;
    --red:            #ff453a;
    --purple:         #bf5af2;
    --teal:           #64d2ff;
    --navbar-bg:      rgba(28,28,30,0.85);
    --tabbar-bg:      rgba(28,28,30,0.94);
    --card-bg:        #1c1c1e;
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--sys-grouped-bg); font-family: var(--font); color: var(--label); overflow: hidden; -webkit-font-smoothing: antialiased; }
#app { height: 100%; display: flex; flex-direction: column; }

/* ── NAVBAR ── */
.navbar {
  position: relative;
  background: var(--navbar-bg);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--separator);
  padding-top: var(--safe-t);
  z-index: 10;
  flex-shrink: 0;
}
.navbar-inner {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 8px 16px 12px;
  min-height: 44px;
}
.navbar-title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  color: var(--label);
  letter-spacing: -0.4px;
}
.navbar-date {
  font-size: 13px;
  color: var(--label2);
  font-weight: 400;
  margin-top: 1px;
}
.navbar-actions { display: flex; gap: 8px; align-items: center; padding-bottom: 2px; }
.nav-action-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--sys-fill);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; cursor: pointer; border: none;
  transition: opacity 0.15s;
  color: var(--blue);
}
.nav-action-btn:active { opacity: 0.5; }

/* weather bar */
.weather-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px 10px;
  border-top: 0.5px solid var(--separator);
}
.wx-icon { font-size: 18px; line-height: 1; }
.wx-temp { font-size: 15px; font-weight: 600; color: var(--label); }
.wx-desc { font-size: 14px; color: var(--label2); margin-left: 4px; }
.wx-right { margin-left: auto; display: flex; gap: 12px; }
.wx-stat { font-size: 13px; color: var(--label2); }
.wx-current { display: flex; align-items: center; gap: 8px; width: 100%; }
.wx-forecast { display: flex; gap: 0; border-top: 0.5px solid var(--separator); margin-top: 8px; padding-top: 8px; width: 100%; justify-content: space-around; }
.wx-forecast-day { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
.wx-fc-name { font-size: 11px; color: var(--label3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.wx-fc-icon { font-size: 18px; line-height: 1.3; }
.wx-fc-hi { font-size: 13px; font-weight: 600; color: var(--label); }
.wx-fc-lo { font-size: 12px; color: var(--label3); }

/* ── SCROLL BODY ── */
.scroll-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--sys-grouped-bg);
  padding-bottom: calc(84px + var(--safe-b));
}

/* large title section */
.large-title-section {
  padding: 20px 20px 4px;
}
.large-title {
  font-family: var(--font-display);
  font-size: 34px;
  font-weight: 700;
  color: var(--label);
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.large-subtitle {
  font-size: 15px;
  color: var(--label2);
  margin-top: 4px;
  font-weight: 400;
}

/* ── GROUPED TABLE (iOS Settings style) ── */
.table-group {
  margin: 20px 16px 0;
}
.table-group-header {
  font-size: 13px;
  font-weight: 400;
  color: var(--label2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0 16px 6px;
}
.table-group-footer {
  font-size: 13px;
  color: var(--label2);
  padding: 6px 16px 0;
  line-height: 1.4;
}
.table-card {
  background: var(--card-bg);
  border-radius: 10px;
  overflow: hidden;
}
.table-row {
  display: flex;
  align-items: center;
  padding: 11px 16px;
  min-height: 44px;
  gap: 12px;
  position: relative;
  cursor: pointer;
}
.table-row:active { background: var(--sys-fill2); }
.table-row + .table-row::before {
  content: '';
  position: absolute;
  top: 0; left: 56px; right: 0;
  height: 0.5px;
  background: var(--separator);
}
.table-row.no-indent + .table-row::before,
.table-row + .table-row.no-indent::before { left: 16px; }

/* row icon */
.row-icon {
  width: 30px; height: 30px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.row-icon.blue   { background: var(--blue); }
.row-icon.green  { background: var(--green); }
.row-icon.orange { background: var(--orange); }
.row-icon.red    { background: var(--red); }
.row-icon.purple { background: var(--purple); }
.row-icon.teal   { background: var(--teal); }
.row-icon.gray   { background: var(--sys-fill); }

.row-body { flex: 1; min-width: 0; }
.row-label { font-size: 17px; color: var(--label); font-weight: 400; }
.row-sublabel { font-size: 13px; color: var(--label2); margin-top: 1px; }

.row-detail { font-size: 17px; color: var(--label2); flex-shrink: 0; }
.row-chevron { font-size: 14px; color: var(--label3); flex-shrink: 0; margin-left: 4px; }

/* checkmark row */
.row-check {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid var(--sep-opaque);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.table-row.checked .row-check {
  background: var(--green);
  border-color: var(--green);
}
.row-check-tick { display: none; color: #fff; font-size: 12px; font-weight: 700; }
.table-row.checked .row-check-tick { display: block; }
.table-row.checked .row-label { color: var(--label3); text-decoration: line-through; }

/* time progress */
.progress-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px 10px;
}
.progress-track { flex: 1; height: 4px; background: var(--sys-fill); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; background: var(--blue); transition: width 0.4s; }
.progress-fill.done { background: var(--green); }
.progress-fill.over { background: var(--red); }
.progress-label { font-size: 13px; color: var(--label2); white-space: nowrap; }

/* calendar event row */
.cal-row {
  display: flex; align-items: center; padding: 11px 16px; gap: 12px; min-height: 44px;
}
.cal-row + .cal-row { border-top: 0.5px solid var(--separator); }
.cal-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cal-title { font-size: 17px; color: var(--label); flex: 1; }
.cal-time { font-size: 15px; color: var(--label2); }
.cal-empty { padding: 14px 16px; font-size: 17px; color: var(--label3); text-align: center; }

/* badge / pill */
.badge {
  font-size: 12px; font-weight: 600; padding: 2px 8px;
  border-radius: 10px; flex-shrink: 0; white-space: nowrap;
}
.badge-blue   { background: rgba(0,122,255,0.12); color: var(--blue); }
.badge-green  { background: rgba(52,199,89,0.12); color: var(--green); }
.badge-orange { background: rgba(255,149,0,0.12); color: var(--orange); }
.badge-red    { background: rgba(255,59,48,0.12); color: var(--red); }
.badge-purple { background: rgba(175,82,222,0.12); color: var(--purple); }

/* section header inside card (floor label etc) */
.inset-header {
  font-size: 13px; font-weight: 600; color: var(--label2);
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 8px 16px 2px;
  border-top: 0.5px solid var(--separator);
}
.inset-header:first-child { border-top: none; }

/* day pill row */
.day-pills {
  display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch; padding: 16px 16px 0;
}
.day-pills::-webkit-scrollbar { display: none; }
.day-pill {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  font-size: 14px; font-weight: 500;
  background: var(--card-bg); color: var(--label2);
  border: 0.5px solid var(--separator); cursor: pointer;
  transition: all 0.15s;
}
.day-pill.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.day-pill.is-today:not(.active) { border-color: var(--blue); color: var(--blue); }

/* rest day */
.rest-day { padding: 32px 16px; text-align: center; }
.rest-emoji { font-size: 44px; margin-bottom: 10px; }
.rest-title { font-size: 20px; font-weight: 600; color: var(--label); margin-bottom: 4px; }
.rest-sub { font-size: 15px; color: var(--label2); }

/* all done */
.all-done-banner {
  margin: 0 16px 0; background: rgba(52,199,89,0.12);
  border-radius: 10px; padding: 12px 16px; text-align: center;
}
.all-done-title { font-size: 15px; font-weight: 600; color: var(--green); }

/* to-do input */
.todo-input-row {
  display: flex; gap: 8px; padding: 10px 16px;
  border-bottom: 0.5px solid var(--separator);
}
.todo-input {
  flex: 1; background: var(--sys-fill); border: none; border-radius: 8px;
  padding: 8px 12px; font-family: var(--font); font-size: 17px; color: var(--label);
  outline: none;
}
.todo-input::placeholder { color: var(--label3); }
.todo-add-btn {
  background: none; border: none; font-size: 17px; font-weight: 600;
  color: var(--blue); cursor: pointer; font-family: var(--font); padding: 8px 4px;
}
.todo-add-btn:active { opacity: 0.5; }
.row-del { font-size: 22px; color: var(--red); padding: 0 4px; line-height: 1; }

/* notes */
.notes-textarea {
  width: 100%; background: transparent; border: none; outline: none;
  font-family: var(--font); font-size: 17px; color: var(--label);
  padding: 12px 16px; resize: none; min-height: 200px; line-height: 1.6;
  display: block;
}
.notes-textarea::placeholder { color: var(--label3); }
.notes-footer { padding: 4px 16px 12px; display: flex; justify-content: space-between; }
.notes-saved { font-size: 13px; color: var(--label3); }
.notes-clear { font-size: 15px; color: var(--red); cursor: pointer; }

/* bin */
.bin-content { display: flex; align-items: center; gap: 12px; padding: 12px 16px 14px; }
.bin-emoji { font-size: 32px; }
.bin-body .row-label { font-size: 17px; font-weight: 500; }
.bin-body .row-sublabel { font-size: 14px; margin-top: 3px; }

/* setup prompt */
.setup-cell { padding: 16px; text-align: center; }
.setup-text { font-size: 15px; color: var(--label2); margin-bottom: 12px; line-height: 1.5; }
.setup-link { font-size: 17px; font-weight: 500; color: var(--blue); cursor: pointer; }

/* ── BOTTOM TAB BAR ── */
.tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(49px + var(--safe-b));
  background: var(--tabbar-bg);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 0.5px solid var(--separator);
  display: flex;
  align-items: stretch;
  z-index: 20;
  padding-bottom: var(--safe-b);
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px; cursor: pointer;
  padding: 4px 0 2px; transition: opacity 0.1s;
}
.tab-item:active { opacity: 0.7; }
.tab-icon { font-size: 22px; line-height: 1; }
.tab-label { font-size: 10px; font-weight: 500; color: var(--label3); letter-spacing: 0.01em; }
.tab-item.active .tab-label { color: var(--blue); }
.tab-item.active .tab-icon { filter: none; }

/* sync row */
.sync-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 16px 8px;
}
.sync-label { font-size: 13px; color: var(--label3); }
.sync-btn { font-size: 15px; font-weight: 500; color: var(--blue); cursor: pointer; }
.sync-btn:active { opacity: 0.5; }

/* ── SETTINGS SHEET ── */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 100; display: flex; align-items: flex-end;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from {opacity:0} to {opacity:1} }
.sheet {
  width: 100%; background: var(--sys-bg2);
  border-radius: 12px 12px 0 0;
  padding: 0 0 calc(20px + var(--safe-b));
  max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
}
@keyframes slideUp { from {transform:translateY(100%)} to {transform:translateY(0)} }
.sheet-handle {
  width: 36px; height: 4px; background: var(--sep-opaque);
  border-radius: 2px; margin: 8px auto 4px;
}
.sheet-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 20px 4px;
}
.sheet-title { font-size: 17px; font-weight: 600; color: var(--label); }
.sheet-close { font-size: 17px; font-weight: 500; color: var(--blue); cursor: pointer; }
.sheet-close:active { opacity: 0.5; }
.sheet-group { margin: 20px 16px 0; }
.sheet-group-hdr { font-size: 13px; color: var(--label2); text-transform: uppercase; letter-spacing: 0.06em; padding: 0 4px 6px; }
.sheet-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; }
.sheet-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; min-height: 44px; gap: 12px;
}
.sheet-row + .sheet-row { border-top: 0.5px solid var(--separator); }
.sheet-row-label { font-size: 17px; color: var(--label); }
.sheet-row-sub { font-size: 13px; color: var(--label2); margin-top: 2px; }
.s-btn {
  font-size: 15px; font-weight: 500; color: var(--blue);
  background: none; border: none; cursor: pointer; font-family: var(--font);
  padding: 4px 0; white-space: nowrap;
}
.s-btn:active { opacity: 0.5; }
.s-btn.destructive { color: var(--red); }
.s-select {
  background: var(--sys-fill); border: none; border-radius: 8px;
  padding: 6px 10px; font-family: var(--font); font-size: 15px;
  color: var(--label); outline: none;
}
.s-input-block {
  padding: 4px 16px 12px;
}
.s-input {
  width: 100%; background: var(--sys-fill); border: none; border-radius: 8px;
  padding: 10px 12px; font-family: var(--font); font-size: 15px; color: var(--label);
  outline: none; margin-top: 6px;
}
.s-input::placeholder { color: var(--label3); }
.s-save-btn {
  width: calc(100% - 32px); margin: 8px 16px 0;
  background: var(--blue); color: #fff; border: none; border-radius: 10px;
  padding: 14px; font-size: 17px; font-weight: 600; font-family: var(--font);
  cursor: pointer;
}
.s-save-btn:active { opacity: 0.85; }
.status-pill {
  font-size: 13px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
}
.status-on { background: rgba(52,199,89,0.12); color: var(--green); }
.status-off { background: rgba(255,59,48,0.12); color: var(--red); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(64px + var(--safe-b)); left: 50%; transform: translateX(-50%);
  background: rgba(50,50,52,0.95); color: #fff;
  padding: 9px 18px; border-radius: 20px; font-size: 14px; font-weight: 500;
  z-index: 200; white-space: nowrap; animation: fadeIn 0.2s;
}

/* install banner */
.install-banner {
  margin: 12px 16px 0; background: rgba(0,122,255,0.1);
  border-radius: 10px; padding: 10px 14px;
  display: flex; gap: 10px; align-items: flex-start;
}
.install-text { flex: 1; font-size: 14px; color: var(--blue); line-height: 1.4; }
.install-close { font-size: 20px; color: var(--label3); cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <div class="navbar">
    <div class="navbar-inner">
      <div>
        <div class="navbar-title" id="navTitle">Family Homepage</div>
        <div class="navbar-date" id="navDate"></div>
      </div>
      <div class="navbar-actions">
        <button class="nav-action-btn" onclick="refreshWeather()" title="Refresh weather">↻</button>
        <button class="nav-action-btn" onclick="openSettings()" title="Settings">⚙</button>
      </div>
    </div>
    <div class="weather-bar" id="weatherBar">
      <span class="wx-stat" style="color:var(--label3)">Loading weather…</span>
    </div>
  </div>

  <div class="scroll-body" id="scrollBody">
    <div id="installBanner"></div>
    <div id="pageContent"></div>
  </div>

  <div class="tab-bar" id="tabBar"></div>
</div>
<div id="sheetContainer"></div>

// ─── BIN ─────────────────────────────────────────────────────────────────────
const BIN_REF = new Date("2024-01-04");
function getBinInfo() {
  const today = new Date(), day = today.getDay();
  const daysToThurs = (4 - day + 7) % 7;
  const nextThurs = new Date(today);
  nextThurs.setDate(today.getDate() + daysToThurs);
  nextThurs.setHours(0,0,0,0);
  const weeksSinceRef = Math.round((nextThurs - BIN_REF) / (7*24*3600*1000));
  const recycling = weeksSinceRef % 2 === 1;
  return { daysToThurs, isToday: daysToThurs===0, isTomorrow: daysToThurs===1, recycling, urgent: daysToThurs<=1 };
}

const WX_CODES={0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",48:"🌫",51:"🌦",53:"🌦",55:"🌧",61:"🌧",63:"🌧",65:"🌧",71:"🌨",73:"🌨",75:"❄️",80:"🌦",81:"🌧",82:"🌧",95:"⛈",96:"⛈",99:"⛈"};
const WX_DESC={0:"Clear",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",45:"Foggy",48:"Icy fog",51:"Light drizzle",53:"Drizzle",55:"Heavy drizzle",61:"Light rain",63:"Rain",65:"Heavy rain",71:"Light snow",73:"Snow",75:"Heavy snow",80:"Showers",81:"Showers",82:"Heavy showers",95:"Thunderstorm",96:"Thunderstorm",99:"Thunderstorm"};
async function fetchWeather(force) {
  const now = Date.now();
  if (!force && S.weather && (now-S.weatherTs)<30*60*1000) { renderWeather(); return; }
  try {
    const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=51.568&longitude=-0.0155&current=temperature_2m,weathercode,windspeed_10m,precipitation&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=Europe%2FLondon&forecast_days=4");
    const d = await r.json();
    S.weather = {
      temp: Math.round(d.current.temperature_2m),
      code: d.current.weathercode,
      wind: Math.round(d.current.windspeed_10m),
      rain: d.current.precipitation,
      forecast: d.daily.time.slice(1,4).map((date,i) => ({
        date,
        code: d.daily.weathercode[i+1],
        hi:   Math.round(d.daily.temperature_2m_max[i+1]),
        lo:   Math.round(d.daily.temperature_2m_min[i+1]),
        rain: d.daily.precipitation_sum[i+1],
      }))
    };
    S.weatherTs = now;
    localStorage.setItem("weather",JSON.stringify(S.weather));
    localStorage.setItem("weatherTs",String(now));
  } catch(e){ S.weather=null; }
  renderWeather();
}
function refreshWeather(){ fetchWeather(true); showToast("Refreshing weather…"); }

// ─── CALENDAR ────────────────────────────────────────────────────────────────
async function fetchCal(showToastMsg) {
  if (!S.icalUrl) return;
  const url = S.icalUrl.replace("webcal://","https://");
  
  // Try multiple proxies in order
  const proxies = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];
  
  let lastError = "";
  for (const proxy of proxies) {
    try {
      const r = await fetch(proxy);
      if (!r.ok) { lastError = `HTTP ${r.status}`; continue; }
      const text = await r.text();
      if (!text.includes("BEGIN:VCALENDAR")) { lastError = "Response is not a valid iCal feed"; continue; }
      S.calEvents = parseIcal(text);
      S.calError = null;
      const now = new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
      S.calLastFetched = now;
      localStorage.setItem("calLastFetched",now);
      if (showToastMsg) showToast(`Calendar refreshed ✓ (${S.calEvents.length} events)`);
      render();
      return;
    } catch(e) {
      lastError = e.message;
      continue;
    }
  }
  // All proxies failed
  S.calError = lastError;
  if (showToastMsg) showToast("Calendar fetch failed — see Calendar tab");
  render();
}
function parseIcal(text) {
  const events=[], blocks=text.split("BEGIN:VEVENT");
  for (let i=1;i<blocks.length;i++) {
    const b=blocks[i], get=k=>{ const m=b.match(new RegExp(k+"[^:]*:([^\\r\\n]+)")); return m?m[1].trim():""; };
    const summary=get("SUMMARY"), dtstart=get("DTSTART"), dtend=get("DTEND");
    const allDay=!dtstart.includes("T");
    const start=parseIcalDate(dtstart), end=parseIcalDate(dtend);
    if (summary&&start) events.push({summary,start,end,allDay});
  }
  return events;
}
function parseIcalDate(s) {
  if (!s) return null;
  if (s.includes("T")) { const y=s.slice(0,4),mo=s.slice(4,6),d=s.slice(6,8),h=s.slice(9,11),mi=s.slice(11,13); return new Date(`${y}-${mo}-${d}T${h}:${mi}:00`); }
  return new Date(`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}T00:00:00`);
}
function getEventsForDate(date) {
  const s=new Date(date); s.setHours(0,0,0,0);
  const e=new Date(date); e.setHours(23,59,59,999);
  return S.calEvents.filter(ev=>ev.start<=e&&(ev.end?ev.end>=s:ev.start>=s)).sort((a,b)=>a.start-b.start);
}
function fmtTime(d,allDay){ return allDay?"All day":d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}); }

function getDayTasks(dayIdx) {
  const base=[...WEEK_SCHED[dayIdx].tasks];
  if (dayIdx===todayDayIdx()) MONTHLY_EXTRAS[weekOfMonth()].forEach(i=>{ if(!base.includes(i)) base.push(i); });
  return [...new Set(base)].map(i=>({...TASKS[i],id:i}));
}
function groupByFloor(tasks) {
  const g={};
  tasks.forEach(t=>{ if(!g[t.floor]) g[t.floor]=[]; g[t.floor].push(t); });
  return Object.entries(g).sort((a,b)=>{ const fa=parseInt(a[0]),fb=parseInt(b[0]); if(fa===-99)return 1; if(fb===-99)return -1; return fa-fb; });
}

// ─── RENDER HELPERS ──────────────────────────────────────────────────────────
function calGoogleLink(e) {
  // Opens event search in Google Calendar app (installed on iPad)
  // Falls back to web if app not installed
  const fmt = d => d ? d.toISOString().replace(/-|:|\.\d{3}/g,"") : "";
  const start = fmt(e.start);
  const end   = e.end ? fmt(e.end) : fmt(new Date(e.start.getTime()+3600000));
  const title = encodeURIComponent(e.summary);
  // Try Google Calendar app deep link first, fallback to web
  return `googlecalendar://event?title=${title}&start=${start}&end=${end}`;
}
// openCalEvent defined below
// Store events in a lookup so onclick can reference by index safely
window._calEventStore = {};
function calRows(events, storeKey) {
  if (!events.length) return `<div class="cal-empty">Nothing on</div>`;
  window._calEventStore[storeKey] = events;
  return events.map((e,i)=>`<div class="cal-row" onclick="openCalEvent('${storeKey}',${i})" style="cursor:pointer">
    <div class="cal-dot" style="background:${CAL_COLORS[i%CAL_COLORS.length]}"></div>
    <div class="cal-title">${e.summary}</div>
    <div class="cal-time">${fmtTime(e.start,e.allDay)}</div>
    <div style="font-size:12px;color:var(--label3);margin-left:4px">›</div>
  </div>`).join("");
}
function openCalEvent(storeKey, idx) {
  const e = (window._calEventStore[storeKey]||[])[idx];
  if (!e) return;
  const fmt = d => d ? new Date(d).toISOString().replace(/-|:|\.\d{3}/g,"") : "";
  const start = fmt(e.start);
  const end   = e.end ? fmt(e.end) : fmt(new Date(new Date(e.start).getTime()+3600000));
  const appUrl = `googlecalendar://event?title=${encodeURIComponent(e.summary)}&start=${start}&end=${end}`;
  const webUrl = `https://calendar.google.com/calendar/r/search?q=${encodeURIComponent(e.summary)}`;
  const iframe = document.createElement("iframe");
  iframe.style.display = "none";
  iframe.src = appUrl;
  document.body.appendChild(iframe);
  setTimeout(() => iframe.remove(), 500);
  setTimeout(() => window.open(webUrl, "_blank"), 300);
}

function cleaningSection(dayIdx) {
  const tasks=getDayTasks(dayIdx);
  if (!tasks.length) return `<div class="rest-day"><div class="rest-emoji">🌿</div><div class="rest-title">Rest day</div><div class="rest-sub">No cleaning today</div></div>`;
  const done=tasks.filter(t=>S.checks[`${dayIdx}-${t.id}`]).length;
  const total=tasks.reduce((s,t)=>s+t.mins,0);
  const remaining=tasks.filter(t=>!S.checks[`${dayIdx}-${t.id}`]).reduce((s,t)=>s+t.mins,0);
  const pct=Math.min(100,Math.round(total/60*100));
  const allDone=done===tasks.length;
  let html=`<div class="progress-row">
    <span class="progress-label">${remaining}m left</span>
    <div class="progress-track"><div class="progress-fill${allDone?" done":pct>100?" over":""}" style="width:${pct}%"></div></div>
    <span class="progress-label">${total}m</span>
  </div>`;
  groupByFloor(tasks).forEach(([floor,ft])=>{
    html+=`<div class="inset-header">${FLOOR_NAMES[floor]||"Other"}</div>`;
    ft.forEach(t=>{
      const k=`${dayIdx}-${t.id}`,chk=S.checks[k];
      html+=`<div class="table-row${chk?" checked":""}" onclick="toggleTask(${dayIdx},${t.id})">
        <div class="row-check"><span class="row-check-tick">✓</span></div>
        <div class="row-body">
          <div class="row-label">${t.task}</div>
          <div class="row-sublabel">${t.loc}${t.note?" · "+t.note:""}</div>
        </div>
        <div class="row-detail" style="font-size:14px;color:var(--label3)">${t.mins}m</div>
      </div>`;
    });
  });
  if (allDone) {
    return `<div class="all-done-banner" style="margin:12px;"><div class="all-done-title">✨ All done — house looking great</div></div>`;
  }
  return html;
}

        <div class="row-check"><span class="row-check-tick">✓</span></div>
        <div class="row-body"><div class="row-label">${t.text}</div></div>
        <div class="row-del" onclick="event.stopPropagation();deleteTodo('${t.id}')">−</div>
      </div>`).join("")}
      ${!open.length?`<div class="cal-empty" style="padding:18px">All clear! 🎉</div>`:""}
    </div>
  </div>`;
  if (closed.length) {
    html+=`<div class="table-group">
      <div class="table-group-header" style="display:flex;justify-content:space-between;padding-right:4px"><span>Completed</span><span style="color:var(--red);cursor:pointer;font-size:13px;font-weight:500" onclick="clearDoneTodos()">Clear all</span></div>
      <div class="table-card">
        ${closed.map(t=>`<div class="table-row no-indent checked" onclick="toggleTodo('${t.id}')">
          <div class="row-check"><span class="row-check-tick">✓</span></div>
          <div class="row-body"><div class="row-label">${t.text}</div></div>
          <div class="row-del" onclick="event.stopPropagation();deleteTodo('${t.id}')">−</div>
        </div>`).join("")}
      </div>
    </div>`;
  }
  return html+'<div style="height:8px"></div>';
}
function addTodo(){ const inp=document.getElementById("todoInput"); const v=inp?.value.trim(); if(!v)return; S.todos.unshift({id:Date.now().toString(),text:v,done:false}); saveTodos(); inp.value=""; render(); }
function toggleTodo(id){ const t=S.todos.find(t=>t.id===id); if(t){t.done=!t.done; saveTodos(); render();} }
function deleteTodo(id){ S.todos=S.todos.filter(t=>t.id!==id); saveTodos(); render(); }
function clearDoneTodos(){ S.todos=S.todos.filter(t=>!t.done); saveTodos(); render(); }

// ─── NOTES ───────────────────────────────────────────────────────────────────
function renderNotes() {
  return `<div class="table-group">
    <div class="table-group-header">Family notes</div>
    <div class="table-card">
      <textarea class="notes-textarea" id="notesArea" placeholder="Shopping, reminders, ideas…" oninput="updateNotes(this.value)">${S.notes}</textarea>
      <div class="notes-footer">
        <span class="notes-saved" id="notesSaved"></span>
        ${S.notes?`<span class="notes-clear" onclick="clearNotes()">Clear</span>`:""}
      </div>
    </div>
  </div><div style="height:8px"></div>`;
}
let notesTimer;
function updateNotes(v){ S.notes=v; clearTimeout(notesTimer); notesTimer=setTimeout(()=>{ saveNotes(); const el=document.getElementById("notesSaved"); if(el){el.textContent="Saved";setTimeout(()=>{if(el)el.textContent="";},1500);}},800); }
function clearNotes(){ if(!confirm("Clear all notes?")) return; S.notes=""; saveNotes(); render(); }

// ─── SETTINGS ────────────────────────────────────────────────────────────────
function openSettings() {
  const granted=typeof Notification!=="undefined"&&Notification.permission==="granted";
  document.getElementById("sheetContainer").innerHTML=`<div class="sheet-overlay" onclick="if(event.target.classList.contains('sheet-overlay'))closeSettings()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-nav">
      <div class="sheet-title">Settings</div>
      <div class="sheet-close" onclick="closeSettings()">Done</div>
    </div>

    <div class="sheet-group">
      <div class="sheet-group-hdr">Calendar</div>
      <div class="sheet-card">
        <div class="sheet-row"><div><div class="sheet-row-label">iCal URL</div><div class="sheet-row-sub">Paste your webcal:// or https:// link</div></div></div>
        <div class="s-input-block"><input class="s-input" id="icalInput" type="url" placeholder="webcal://…" value="${S.icalUrl}"></div>
      </div>
      <div style="display:flex;gap:8px;padding:8px 0 0">
        <button class="s-save-btn" onclick="saveIcal()">Save &amp; sync calendar</button>
      </div>
      ${S.icalUrl?`<div style="padding:8px 0 0;text-align:center"><button class="s-btn destructive" onclick="clearIcal()">Remove calendar</button></div>`:""}
    </div>

    <div class="sheet-group">
      <div class="sheet-group-hdr">Notifications</div>
      <div class="sheet-card">
        <div class="sheet-row">
          <div><div class="sheet-row-label">Daily reminder</div><div class="sheet-row-sub">${granted?"Permission granted":"Add to Home Screen first"}</div></div>
          ${granted?`<span class="status-pill ${S.notifEnabled?"status-on":"status-off"}">${S.notifEnabled?"On":"Off"}</span>`:`<button class="s-btn" onclick="requestNotif()">Enable</button>`}
        </div>
        <div class="sheet-row">
          <div class="sheet-row-label">Reminder time</div>
          <select class="s-select" onchange="saveNotifTime(this.value)">
            ${["07:00","07:30","08:00","08:30","09:00","09:30","10:00"].map(t=>`<option value="${t}"${S.notifTime===t?" selected":""}>${t}</option>`).join("")}
          </select>
        </div>
        ${granted&&S.notifEnabled?`<div class="sheet-row"><div class="sheet-row-label">Test notification</div><button class="s-btn" onclick="testNotif()">Send now</button></div>`:""}
      </div>
    </div>

    <div class="sheet-group">
      <div class="sheet-group-hdr">Cleaning</div>
      <div class="sheet-card">
        <div class="sheet-row"><div class="sheet-row-label">Reset today's tasks</div><button class="s-btn destructive" onclick="resetToday()">Reset</button></div>
      </div>
    </div>
  </div></div>`;
}
function closeSettings(){ document.getElementById("sheetContainer").innerHTML=""; }
function saveIcal(){ const v=document.getElementById("icalInput")?.value.trim(); S.icalUrl=v||""; localStorage.setItem("icalUrl",S.icalUrl); closeSettings(); showToast("Calendar saved — syncing…"); fetchCal(false); }
function clearIcal(){ S.icalUrl=""; S.calEvents=[]; localStorage.setItem("icalUrl",""); closeSettings(); render(); }
async function requestNotif(){ if(!("Notification"in window)){alert("Not supported");return;} const p=await Notification.requestPermission(); if(p==="granted"){S.notifEnabled=true;localStorage.setItem("notifEnabled","true");scheduleNotif();closeSettings();showToast("Reminders on ✓");}else{alert("Denied — enable in Safari settings → this site → Notifications");} }
function saveNotifTime(t){ S.notifTime=t; localStorage.setItem("notifTime",t); scheduleNotif(); }
function scheduleNotif(){ if(!S.notifEnabled)return; if(window._notifTimer)clearTimeout(window._notifTimer); const[h,m]=S.notifTime.split(":").map(Number); const next=new Date(); next.setHours(h,m,0,0); if(next<=new Date())next.setDate(next.getDate()+1); window._notifTimer=setTimeout(()=>{ const tasks=getDayTasks(todayDayIdx()); new Notification("Family Homepage 🏠",{body:`${tasks.length} tasks today · ${tasks.reduce((s,t)=>s+t.mins,0)} min`,icon:"icons/icon-192.png"}); scheduleNotif(); },next-new Date()); }
function testNotif(){ const tasks=getDayTasks(todayDayIdx()); new Notification("Family Homepage 🏠",{body:`${tasks.length} tasks today · ${tasks.reduce((s,t)=>s+t.mins,0)} min`,icon:"icons/icon-192.png"}); }
function resetToday(){ const di=todayDayIdx(); getDayTasks(di).forEach(t=>delete S.checks[`${di}-${t.id}`]); saveChecks(); closeSettings(); render(); showToast("Today reset"); }

// ─── INSTALL / TOAST ─────────────────────────────────────────────────────────
function checkInstall(){ if(localStorage.getItem("installDismissed")||window.navigator.standalone||!/Safari/.test(navigator.userAgent)||/Chrome/.test(navigator.userAgent))return; document.getElementById("installBanner").innerHTML=`<div class="install-banner"><span class="install-text">Tap <strong>⎙ Share</strong> → <strong>Add to Home Screen</strong> for daily alerts</span><span class="install-close" onclick="localStorage.setItem('installDismissed','1');this.closest('.install-banner').remove()">×</span></div>`; }
function showToast(msg){ const el=document.createElement("div"); el.className="toast"; el.textContent=msg; document.body.appendChild(el); setTimeout(()=>el.remove(),2200); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById("navDate").textContent = new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
load(); render(); checkInstall(); fetchWeather();
if (S.icalUrl) fetchCal(false);
if (S.notifEnabled&&typeof Notification!=="undefined"&&Notification.permission==="granted") scheduleNotif();

// Auto-refresh every 30 seconds
setInterval(() => {
  fetchWeather(false);
  if (S.icalUrl) fetchCal(false);
}, 30000);

// ─── PULL TO REFRESH ─────────────────────────────────────────────────────────
(function() {
  const el = document.getElementById("scrollBody");
  let startY = 0, pulling = false, indicator = null;
  el.addEventListener("touchstart", e => {
    if (el.scrollTop === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, {passive: true});
  el.addEventListener("touchmove", e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 10 && el.scrollTop === 0) {
      if (!indicator) {
        indicator = document.createElement("div");
        indicator.style.cssText = "text-align:center;padding:10px;font-size:13px;color:var(--label3);transition:opacity 0.2s";
        indicator.textContent = "↓ Pull to refresh";
        el.prepend(indicator);
      }
      indicator.textContent = dy > 60 ? "↑ Release to refresh" : "↓ Pull to refresh";
    }
  }, {passive: true});
  el.addEventListener("touchend", e => {
    if (!pulling) return;
    pulling = false;
    const dy = e.changedTouches[0].clientY - startY;
    if (indicator) { indicator.remove(); indicator = null; }
    if (dy > 60) {
      showToast("Refreshing…");
      fetchWeather(true);
      if (S.icalUrl) fetchCal(true);
    }
    startY = 0;
  }, {passive: true});
})();

</script>
</body>
</html>
