<style>
/* ── iOS SYSTEM TOKENS ── */
:root {
  --sys-bg:          #f2f2f7;
  --sys-bg2:         rgba(255,255,255,0.92);
  --sys-bg3:         #f2f2f7;
  --sys-grouped-bg:  #eef3ea;
  --sys-fill:        rgba(120,120,128,0.16);
  --sys-fill2:       rgba(120,120,128,0.08);
  --label:           #000000;
  --label2:          rgba(60,60,67,0.6);
  --label3:          rgba(60,60,67,0.3);
  --label4:          rgba(60,60,67,0.18);
  --separator:       rgba(60,60,67,0.29);
  --sep-opaque:      #c6c6c8;
  --blue:            #2f9e6b;
  --green:           #3fb27a;
  --orange:          #f08a3c;
  --red:             #e0466b;
  --purple:          #c45c9e;
  --teal:            #3aa6b0;
  --navbar-bg:       rgba(242,242,247,0.55);
  --tabbar-bg:       rgba(249,249,249,0.62);
  --card-bg:         rgba(255,255,255,0.55);
  --safe-t:          env(safe-area-inset-top, 44px);
  --safe-b:          env(safe-area-inset-bottom, 0px);
  --font:            -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  --font-display:    -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --sys-bg:         #000000;
    --sys-bg2:        rgba(28,28,30,0.92);
    --sys-bg3:        #2c2c2e;
    --sys-grouped-bg: #000000;
    --sys-fill:       rgba(120,120,128,0.36);
    --sys-fill2:      rgba(120,120,128,0.24);
    --label:          #ffffff;
    --label2:         rgba(235,235,245,0.6);
    --label3:         rgba(235,235,245,0.3);
    --label4:         rgba(235,235,245,0.18);
    --separator:      rgba(84,84,88,0.65);
    --sep-opaque:     #38383a;
    --blue:           #4cba85;
    --green:          #52c98e;
--orange:#ffaa55;
    --red:            #f06088;
    --purple:         #d47ab8;
    --teal:           #5bc0ca;
    --navbar-bg:      rgba(28,28,30,0.55);
    --tabbar-bg:      rgba(28,28,30,0.62);
    --card-bg:        rgba(28,28,30,0.50);
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--sys-grouped-bg); font-family: var(--font); color: var(--label); overflow: hidden; -webkit-font-smoothing: antialiased; }
#app { position: relative; z-index: 2; }
#app { height: 100%; display: flex; flex-direction: column; }

/* ── NAVBAR ── */
.navbar {
  position: relative;
  background: var(--navbar-bg);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--separator);
  padding-top: var(--safe-t);
  z-index: 10;
  flex-shrink: 0;
}
.navbar-inner {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 8px 16px 12px;
  min-height: 44px;
}
.navbar-title img { vertical-align: middle; }
.navbar-title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  color: var(--label);
  letter-spacing: -0.4px;
}
.navbar-date {
  font-size: 13px;
  color: var(--label2);
  font-weight: 400;
  margin-top: 1px;
}
.navbar-actions { display: flex; gap: 8px; align-items: center; padding-bottom: 2px; }
.nav-action-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--sys-fill);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; cursor: pointer; border: none;
  transition: opacity 0.15s;
  color: var(--blue);
}
.nav-action-btn:active { opacity: 0.5; }

/* weather bar */
.weather-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px 10px;
  border-top: 0.5px solid var(--separator);
}
.wx-icon { font-size: 18px; line-height: 1; }
.wx-temp { font-size: 15px; font-weight: 600; color: var(--label); }
.wx-desc { font-size: 14px; color: var(--label2); margin-left: 4px; }
.wx-right { margin-left: auto; display: flex; gap: 12px; }
.wx-stat { font-size: 13px; color: var(--label2); }
.wx-current { display: flex; align-items: center; gap: 8px; width: 100%; }
.wx-forecast { display: flex; gap: 0; border-top: 0.5px solid var(--separator); margin-top: 8px; padding-top: 8px; width: 100%; justify-content: space-around; }
.wx-forecast-day { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
.wx-fc-name { font-size: 11px; color: var(--label3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.wx-fc-icon { font-size: 18px; line-height: 1.3; }
.wx-fc-hi { font-size: 13px; font-weight: 600; color: var(--label); }
.wx-fc-lo { font-size: 12px; color: var(--label3); }


/* ── WEATHER BACKDROP ── */
#weather-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  transition: background 2s ease;
  background: linear-gradient(180deg, #aac7e6 0%, #cfe0ef 100%);
}
/* readability scrim — keeps glass cards legible over bright skies */
#weather-bg::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 30%, rgba(0,0,0,0.04) 100%);
  pointer-events: none;
}
@media (prefers-color-scheme: dark) {
  #weather-bg::after {
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.05) 40%, rgba(0,0,0,0.25) 100%);
  }
}
#weather-bg .sky {
  position: absolute; inset: 0;
  transition: opacity 2.5s ease, background 2.5s ease;
}
#weather-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}
/* sun / moon orb */
#weather-bg .orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(2px);
  transition: opacity 3s ease, transform 3s ease, background 3s ease;
  will-change: transform;
}
@keyframes orbDrift {
  0%   { transform: translate(0,0); }
  50%  { transform: translate(12px, 18px); }
  100% { transform: translate(0,0); }
}
@keyframes cloudDrift1 {
  0%   { transform: translateX(-20vw); }
  100% { transform: translateX(120vw); }
}
@keyframes cloudDrift2 {
  0%   { transform: translateX(-30vw); }
  100% { transform: translateX(120vw); }
}
#weather-bg .cloud {
  position: absolute;
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
  border-radius: 50%;
  opacity: 0.7;
  will-change: transform;
}
@keyframes flicker {
  0%, 95%, 100% { opacity: 0; }
  96%, 98% { opacity: 0.35; }
}
#weather-bg .lightning {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.8);
  opacity: 0;
}


/* ── JUNGLE FOLIAGE (image-based, lush) ── */
#foliage { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.fol { position: absolute; background-size: contain; background-repeat: no-repeat; }
.fol-canopy { top: calc(var(--safe-t) - 12px); left: -5%; width: 110%; height: 150px; background-position: top center; background-size: cover; }
.fol-tl { top: calc(var(--safe-t) + 30px); left: -60px; width: 230px; height: 230px; background-position: top left; }
.fol-tr { top: calc(var(--safe-t) + 20px); right: -70px; width: 250px; height: 250px; background-position: top right; }
.fol-bl { bottom: calc(58px + var(--safe-b)); left: -70px; width: 240px; height: 240px; background-position: bottom left; }
.fol-br { bottom: calc(56px + var(--safe-b)); right: -70px; width: 250px; height: 250px; background-position: bottom right; }
/* hanging vines (kept as light vector accents over the image canopy) */
.vine { position: absolute; top: calc(var(--safe-t) + 120px); transform-origin: top center; animation: sway 6s ease-in-out infinite; }
.vine-1 { left: 12%; width: 40px; animation-delay: -1s; }
.vine-2 { right: 18%; width: 46px; animation-delay: -3s; }
.vine-3 { left: 52%; width: 34px; animation-delay: -5s; }
@keyframes sway { 0%,100%{transform:rotate(-2.5deg)} 50%{transform:rotate(2.5deg)} }
/* creatures */
.critter { position: absolute; pointer-events: none; }
.critter-parrot    { top: calc(var(--safe-t) + 26px); right: 64px; width: 54px; animation: bob 4s ease-in-out infinite; }
.critter-monkey    { bottom: calc(86px + var(--safe-b)); left: 18px; width: 60px; }
.critter-frog      { bottom: calc(160px + var(--safe-b)); right: 24px; width: 46px; animation: bob 5s ease-in-out infinite -2s; }
.critter-butterfly { top: 30%; left: 16px; width: 38px; animation: flutter 7s ease-in-out infinite; }
.critter-toucan    { top: calc(var(--safe-t) + 84px); left: 34px; width: 52px; animation: bob 6s ease-in-out infinite -1s; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes flutter { 0%{transform:translate(0,0) rotate(-4deg)} 25%{transform:translate(10px,-16px) rotate(4deg)} 50%{transform:translate(2px,-6px) rotate(-3deg)} 75%{transform:translate(14px,-20px) rotate(5deg)} 100%{transform:translate(0,0) rotate(-4deg)} }

/* ── SCROLL BODY ── */
.scroll-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: transparent;
  padding-bottom: calc(110px + var(--safe-b));
}

/* large title section */
.large-title-section {
  padding: 20px 20px 4px;
}
.large-title {
  font-family: var(--font-display);
  font-size: 34px;
  font-weight: 700;
  color: var(--label);
  letter-spacing: -0.5px;
  line-height: 1.1;
  text-shadow: 0 1px 3px rgba(255,255,255,0.25);
}
@media (prefers-color-scheme: dark) {
  .large-title { text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
}
.large-subtitle {
  font-size: 15px;
  color: var(--label2);
  margin-top: 4px;
  font-weight: 400;
}

/* ── GROUPED TABLE (iOS Settings style) ── */
.table-group {
  margin: 20px 16px 0;
}
.table-group-header {
  font-size: 13px;
  font-weight: 600;
  color: var(--label);
  opacity: 0.65;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0 16px 6px;
  text-shadow: 0 1px 2px rgba(255,255,255,0.3);
}
@media (prefers-color-scheme: dark) {
  .table-group-header { text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
}
.table-group-footer {
  font-size: 13px;
  color: var(--label2);
  padding: 6px 16px 0;
  line-height: 1.4;
}
.table-card {
  background: var(--card-bg);
  backdrop-filter: saturate(160%) blur(20px);
  -webkit-backdrop-filter: saturate(160%) blur(20px);
  border-radius: 12px;
  overflow: hidden;
  border: 0.5px solid rgba(255,255,255,0.18);
  box-shadow: 0 1px 12px rgba(0,0,0,0.06);
}
.table-row {
  display: flex;
  align-items: center;
  padding: 11px 16px;
  min-height: 44px;
  gap: 12px;
  position: relative;
  cursor: pointer;
}
.table-row:active { background: var(--sys-fill2); }
.table-row + .table-row::before {
  content: '';
  position: absolute;
  top: 0; left: 56px; right: 0;
  height: 0.5px;
  background: var(--separator);
}
.table-row.no-indent + .table-row::before,
.table-row + .table-row.no-indent::before { left: 16px; }

/* row icon */
.row-icon {
  width: 30px; height: 30px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.row-icon.blue   { background: var(--blue); }
.row-icon.green  { background: var(--green); }
.row-icon.orange { background: var(--orange); }
.row-icon.red    { background: var(--red); }
.row-icon.purple { background: var(--purple); }
.row-icon.teal   { background: var(--teal); }
.row-icon.gray   { background: var(--sys-fill); }

.row-body { flex: 1; min-width: 0; }
.row-label { font-size: 17px; color: var(--label); font-weight: 400; }
.row-sublabel { font-size: 13px; color: var(--label2); margin-top: 1px; }

.row-detail { font-size: 17px; color: var(--label2); flex-shrink: 0; }
.row-chevron { font-size: 14px; color: var(--label3); flex-shrink: 0; margin-left: 4px; }

/* checkmark row */
.row-check {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid var(--sep-opaque);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.table-row.checked .row-check {
  background: var(--green);
  border-color: var(--green);
}
.row-check-tick { display: none; color: #fff; font-size: 12px; font-weight: 700; }
.table-row.checked .row-check-tick { display: block; }
.table-row.checked .row-label { color: var(--label3); text-decoration: line-through; }

/* time progress */
.progress-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px 10px;
}
.progress-track { flex: 1; height: 4px; background: var(--sys-fill); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; background: var(--blue); transition: width 0.4s; }
.progress-fill.done { background: var(--green); }
.progress-fill.over { background: var(--red); }
.progress-label { font-size: 13px; color: var(--label2); white-space: nowrap; }

/* calendar event row */
.cal-row {
  display: flex; align-items: center; padding: 11px 16px; gap: 12px; min-height: 44px;
}
.cal-row + .cal-row { border-top: 0.5px solid var(--separator); }
.cal-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cal-title { font-size: 17px; color: var(--label); flex: 1; }
.cal-time { font-size: 15px; color: var(--label2); }
.cal-empty { padding: 14px 16px; font-size: 17px; color: var(--label3); text-align: center; }

/* badge / pill */
.badge {
  font-size: 12px; font-weight: 600; padding: 2px 8px;
  border-radius: 10px; flex-shrink: 0; white-space: nowrap;
}
.badge-blue   { background: rgba(0,122,255,0.12); color: var(--blue); }
.badge-green  { background: rgba(52,199,89,0.12); color: var(--green); }
.badge-orange { background: rgba(255,149,0,0.12); color: var(--orange); }
.badge-red    { background: rgba(255,59,48,0.12); color: var(--red); }
.badge-purple { background: rgba(175,82,222,0.12); color: var(--purple); }

/* section header inside card (floor label etc) */
.inset-header {
  font-size: 13px; font-weight: 600; color: var(--label2);
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 8px 16px 2px;
  border-top: 0.5px solid var(--separator);
}
.inset-header:first-child { border-top: none; }

/* day pill row */
.day-pills {
  display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch; padding: 16px 16px 0;
}
.day-pills::-webkit-scrollbar { display: none; }
.day-pill {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  font-size: 14px; font-weight: 500;
  background: var(--card-bg);
  backdrop-filter: saturate(160%) blur(14px);
  -webkit-backdrop-filter: saturate(160%) blur(14px);
  color: var(--label2);
  border: 0.5px solid rgba(255,255,255,0.18); cursor: pointer;
  transition: all 0.15s;
}
.day-pill.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.day-pill.is-today:not(.active) { border-color: var(--blue); color: var(--blue); }

/* rest day */
.rest-day { padding: 32px 16px; text-align: center; }
.rest-emoji { font-size: 44px; margin-bottom: 10px; }
.rest-title { font-size: 20px; font-weight: 600; color: var(--label); margin-bottom: 4px; }
.rest-sub { font-size: 15px; color: var(--label2); }

/* all done */
.all-done-banner {
  margin: 0 16px 0; background: rgba(52,199,89,0.12);
  border-radius: 10px; padding: 12px 16px; text-align: center;
}
.all-done-title { font-size: 15px; font-weight: 600; color: var(--green); }

/* to-do input */
.todo-input-row {
  display: flex; gap: 8px; padding: 10px 16px;
  border-bottom: 0.5px solid var(--separator);
}
.todo-input {
  flex: 1; background: var(--sys-fill); border: none; border-radius: 8px;
  padding: 8px 12px; font-family: var(--font); font-size: 17px; color: var(--label);
  outline: none;
}
.todo-input::placeholder { color: var(--label3); }
.todo-add-btn {
  background: none; border: none; font-size: 17px; font-weight: 600;
  color: var(--blue); cursor: pointer; font-family: var(--font); padding: 8px 4px;
}
.todo-add-btn:active { opacity: 0.5; }
.row-del { font-size: 22px; color: var(--red); padding: 0 4px; line-height: 1; }

/* notes */
.notes-textarea {
  width: 100%; background: transparent; border: none; outline: none;
  font-family: var(--font); font-size: 17px; color: var(--label);
  padding: 12px 16px; resize: none; min-height: 200px; line-height: 1.6;
  display: block;
}
.notes-textarea::placeholder { color: var(--label3); }
.notes-footer { padding: 4px 16px 12px; display: flex; justify-content: space-between; }
.notes-saved { font-size: 13px; color: var(--label3); }
.notes-clear { font-size: 15px; color: var(--red); cursor: pointer; }

/* bin */
.bin-content { display: flex; align-items: center; gap: 12px; padding: 12px 16px 14px; }
.bin-emoji { font-size: 32px; }
.bin-body .row-label { font-size: 17px; font-weight: 500; }
.bin-body .row-sublabel { font-size: 14px; margin-top: 3px; }

/* setup prompt */
.setup-cell { padding: 16px; text-align: center; }
.setup-text { font-size: 15px; color: var(--label2); margin-bottom: 12px; line-height: 1.5; }
.setup-link { font-size: 17px; font-weight: 500; color: var(--blue); cursor: pointer; }

/* ── BOTTOM TAB BAR ── */
.tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(82px + var(--safe-b));
  background: var(--tabbar-bg);
  backdrop-filter: saturate(180%) blur(24px);
  -webkit-backdrop-filter: saturate(180%) blur(24px);
  border-top: 0.5px solid var(--separator);
  display: flex;
  align-items: stretch;
  z-index: 20;
  padding-bottom: var(--safe-b);
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 5px; cursor: pointer;
  padding: 8px 0 6px; transition: transform 0.15s ease;
}
.tab-item:active { transform: scale(0.88); }
.tab-icon {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 13px;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.tab-icon svg { width: 27px; height: 27px; display: block; color: var(--label3); }
.tab-item.active .tab-icon svg { color: #fff; }
.tab-icon svg path, .tab-icon svg circle, .tab-icon svg rect, .tab-icon svg line, .tab-icon svg polyline {
  stroke: var(--label3);
  transition: stroke 0.25s ease;
}
.tab-label { font-size: 11px; font-weight: 600; color: var(--label3); letter-spacing: 0.02em; transition: color 0.25s ease; }
/* Active state — filled glassy chip behind the icon + accent colour */
.tab-item.active .tab-icon {
  background: var(--blue);
  box-shadow: 0 4px 14px rgba(0,122,255,0.4);
  transform: translateY(-2px);
}
.tab-item.active .tab-icon svg path,
.tab-item.active .tab-icon svg circle,
.tab-item.active .tab-icon svg rect,
.tab-item.active .tab-icon svg line,
.tab-item.active .tab-icon svg polyline { stroke: #fff; }
.tab-item.active .tab-label { color: var(--blue); }

/* sync row */
.sync-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 16px 8px;
}
.sync-label { font-size: 13px; color: var(--label3); }
.sync-btn { font-size: 15px; font-weight: 500; color: var(--blue); cursor: pointer; }
.sync-btn:active { opacity: 0.5; }

/* ── SETTINGS SHEET ── */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 100; display: flex; align-items: flex-end;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from {opacity:0} to {opacity:1} }
.sheet {
  width: 100%; background: var(--sys-bg2);
  border-radius: 12px 12px 0 0;
  padding: 0 0 calc(20px + var(--safe-b));
  max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
}
@keyframes slideUp { from {transform:translateY(100%)} to {transform:translateY(0)} }
.sheet-handle {
  width: 36px; height: 4px; background: var(--sep-opaque);
  border-radius: 2px; margin: 8px auto 4px;
}
.sheet-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 20px 4px;
}
.sheet-title { font-size: 17px; font-weight: 600; color: var(--label); }
.sheet-close { font-size: 17px; font-weight: 500; color: var(--blue); cursor: pointer; }
.sheet-close:active { opacity: 0.5; }
.sheet-group { margin: 20px 16px 0; }
.sheet-group-hdr { font-size: 13px; color: var(--label2); text-transform: uppercase; letter-spacing: 0.06em; padding: 0 4px 6px; }
.sheet-card { background: var(--card-bg); backdrop-filter: saturate(160%) blur(20px); -webkit-backdrop-filter: saturate(160%) blur(20px); border-radius: 12px; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.18); }
.sheet-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; min-height: 44px; gap: 12px;
}
.sheet-row + .sheet-row { border-top: 0.5px solid var(--separator); }
.sheet-row-label { font-size: 17px; color: var(--label); }
.sheet-row-sub { font-size: 13px; color: var(--label2); margin-top: 2px; }
.s-btn {
  font-size: 15px; font-weight: 500; color: var(--blue);
  background: none; border: none; cursor: pointer; font-family: var(--font);
  padding: 4px 0; white-space: nowrap;
}
.s-btn:active { opacity: 0.5; }
.s-btn.destructive { color: var(--red); }
.s-select {
  background: var(--sys-fill); border: none; border-radius: 8px;
  padding: 6px 10px; font-family: var(--font); font-size: 15px;
  color: var(--label); outline: none;
}
.s-input-block {
  padding: 4px 16px 12px;
}
.s-input {
  width: 100%; background: var(--sys-fill); border: none; border-radius: 8px;
  padding: 10px 12px; font-family: var(--font); font-size: 15px; color: var(--label);
  outline: none; margin-top: 6px;
}
.s-input::placeholder { color: var(--label3); }
.s-save-btn {
  width: calc(100% - 32px); margin: 8px 16px 0;
  background: var(--blue); color: #fff; border: none; border-radius: 10px;
  padding: 14px; font-size: 17px; font-weight: 600; font-family: var(--font);
  cursor: pointer;
}
.s-save-btn:active { opacity: 0.85; }
.status-pill {
  font-size: 13px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
}
.status-on { background: rgba(52,199,89,0.12); color: var(--green); }
.status-off { background: rgba(255,59,48,0.12); color: var(--red); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(64px + var(--safe-b)); left: 50%; transform: translateX(-50%);
  background: rgba(50,50,52,0.95); color: #fff;
  padding: 9px 18px; border-radius: 20px; font-size: 14px; font-weight: 500;
  z-index: 200; white-space: nowrap; animation: fadeIn 0.2s;
}

/* install banner */
.install-banner {
  margin: 12px 16px 0; background: rgba(0,122,255,0.1);
  border-radius: 10px; padding: 10px 14px;
  display: flex; gap: 10px; align-items: flex-start;
}
.install-text { flex: 1; font-size: 14px; color: var(--blue); line-height: 1.4; }
.install-close { font-size: 20px; color: var(--label3); cursor: pointer; }
</style>
</head>

// ─── BIN ─────────────────────────────────────────────────────────────────────
const BIN_REF = new Date("2024-01-04");
function getBinInfo() {
  const today = new Date(), day = today.getDay();
  const daysToThurs = (4 - day + 7) % 7;
  const nextThurs = new Date(today);
  nextThurs.setDate(today.getDate() + daysToThurs);
  nextThurs.setHours(0,0,0,0);
  const weeksSinceRef = Math.round((nextThurs - BIN_REF) / (7*24*3600*1000));
  const recycling = weeksSinceRef % 2 === 1;
  return { daysToThurs, isToday: daysToThurs===0, isTomorrow: daysToThurs===1, recycling, urgent: daysToThurs<=1 };
}

const WX_CODES={0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",48:"🌫",51:"🌦",53:"🌦",55:"🌧",61:"🌧",63:"🌧",65:"🌧",71:"🌨",73:"🌨",75:"❄️",80:"🌦",81:"🌧",82:"🌧",95:"⛈",96:"⛈",99:"⛈"};
const WX_DESC={0:"Clear",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",45:"Foggy",48:"Icy fog",51:"Light drizzle",53:"Drizzle",55:"Heavy drizzle",61:"Light rain",63:"Rain",65:"Heavy rain",71:"Light snow",73:"Snow",75:"Heavy snow",80:"Showers",81:"Showers",82:"Heavy showers",95:"Thunderstorm",96:"Thunderstorm",99:"Thunderstorm"};
async function fetchWeather(force) {
  const now = Date.now();
  if (!force && S.weather && (now-S.weatherTs)<30*60*1000) { renderWeather(); return; }
  try {
    const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=51.568&longitude=-0.0155&current=temperature_2m,weathercode,windspeed_10m,precipitation&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=Europe%2FLondon&forecast_days=4");
    const d = await r.json();
    S.weather = {
      temp: Math.round(d.current.temperature_2m),
      code: d.current.weathercode,
      wind: Math.round(d.current.windspeed_10m),
      rain: d.current.precipitation,
      forecast: d.daily.time.slice(1,4).map((date,i) => ({
        date,
        code: d.daily.weathercode[i+1],
        hi:   Math.round(d.daily.temperature_2m_max[i+1]),
        lo:   Math.round(d.daily.temperature_2m_min[i+1]),
        rain: d.daily.precipitation_sum[i+1],
      }))
    };
    S.weatherTs = now;
    localStorage.setItem("weather",JSON.stringify(S.weather));
    localStorage.setItem("weatherTs",String(now));
  } catch(e){ S.weather=null; }
  renderWeather();
}
function refreshWeather(){ fetchWeather(true); showToast("Refreshing weather…"); }

  applyWeatherScene();
  const el = document.getElementById("weatherBar");
  if (!S.weather) { el.innerHTML=`<span class="wx-stat" style="color:var(--label3)">Tap ↻ to load weather</span>`; return; }

  `;
}

// ─── CALENDAR ────────────────────────────────────────────────────────────────
async function fetchCal(showToastMsg) {
  if (!S.icalUrl) return;
  const url = S.icalUrl.replace("webcal://","https://");
  
  // Try multiple proxies in order
  const proxies = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];
  
  let lastError = "";
  for (const proxy of proxies) {
    try {
      const r = await fetch(proxy);
      if (!r.ok) { lastError = `HTTP ${r.status}`; continue; }
      const text = await r.text();
      if (!text.includes("BEGIN:VCALENDAR")) { lastError = "Response is not a valid iCal feed"; continue; }
      S.calEvents = parseIcal(text);
      S.calError = null;
      const now = new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
      S.calLastFetched = now;
      localStorage.setItem("calLastFetched",now);
      if (showToastMsg) showToast(`Calendar refreshed ✓ (${S.calEvents.length} events)`);
      render();
      return;
    } catch(e) {
      lastError = e.message;
      continue;
    }
  }
  // All proxies failed
  S.calError = lastError;
  if (showToastMsg) showToast("Calendar fetch failed — see Calendar tab");
  render();
}
function parseIcal(text) {
  const events=[], blocks=text.split("BEGIN:VEVENT");
  for (let i=1;i<blocks.length;i++) {
    const b=blocks[i], get=k=>{ const m=b.match(new RegExp(k+"[^:]*:([^\\r\\n]+)")); return m?m[1].trim():""; };
    const summary=get("SUMMARY"), dtstart=get("DTSTART"), dtend=get("DTEND");
    const allDay=!dtstart.includes("T");
    const start=parseIcalDate(dtstart), end=parseIcalDate(dtend);
    if (summary&&start) events.push({summary,start,end,allDay});
  }
  return events;
}
function parseIcalDate(s) {
  if (!s) return null;
  if (s.includes("T")) { const y=s.slice(0,4),mo=s.slice(4,6),d=s.slice(6,8),h=s.slice(9,11),mi=s.slice(11,13); return new Date(`${y}-${mo}-${d}T${h}:${mi}:00`); }
  return new Date(`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}T00:00:00`);
}
function getEventsForDate(date) {
  const s=new Date(date); s.setHours(0,0,0,0);
  const e=new Date(date); e.setHours(23,59,59,999);
  return S.calEvents.filter(ev=>ev.start<=e&&(ev.end?ev.end>=s:ev.start>=s)).sort((a,b)=>a.start-b.start);
}
function fmtTime(d,allDay){ return allDay?"All day":d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}); }

function getDayTasks(dayIdx) {
  const base=[...WEEK_SCHED[dayIdx].tasks];
  if (dayIdx===todayDayIdx()) MONTHLY_EXTRAS[weekOfMonth()].forEach(i=>{ if(!base.includes(i)) base.push(i); });
  return [...new Set(base)].map(i=>({...TASKS[i],id:i}));
}
function groupByFloor(tasks) {
  const g={};
  tasks.forEach(t=>{ if(!g[t.floor]) g[t.floor]=[]; g[t.floor].push(t); });
  return Object.entries(g).sort((a,b)=>{ const fa=parseInt(a[0]),fb=parseInt(b[0]); if(fa===-99)return 1; if(fb===-99)return -1; return fa-fb; });
}
function toggleTask(dayIdx,id) { const k=`${dayIdx}-${id}`; S.checks[k]=!S.checks[k]; saveChecks(); render(); }

// ─── RENDER HELPERS ──────────────────────────────────────────────────────────
function calGoogleLink(e) {
  // Opens event search in Google Calendar app (installed on iPad)
  // Falls back to web if app not installed
  const fmt = d => d ? d.toISOString().replace(/-|:|\.\d{3}/g,"") : "";
  const start = fmt(e.start);
  const end   = e.end ? fmt(e.end) : fmt(new Date(e.start.getTime()+3600000));
  const title = encodeURIComponent(e.summary);
  // Try Google Calendar app deep link first, fallback to web
  return `googlecalendar://event?title=${title}&start=${start}&end=${end}`;
}
// openCalEvent defined below
// Store events in a lookup so onclick can reference by index safely
window._calEventStore = {};
function calRows(events, storeKey) {
  if (!events.length) return `<div class="cal-empty">Nothing on</div>`;
  window._calEventStore[storeKey] = events;
  return events.map((e,i)=>`<div class="cal-row" onclick="openCalEvent('${storeKey}',${i})" style="cursor:pointer">
    <div class="cal-dot" style="background:${CAL_COLORS[i%CAL_COLORS.length]}"></div>
    <div class="cal-title">${e.summary}</div>
    <div class="cal-time">${fmtTime(e.start,e.allDay)}</div>
    <div style="font-size:12px;color:var(--label3);margin-left:4px">›</div>
  </div>`).join("");
}
function openCalEvent(storeKey, idx) {
  const e = (window._calEventStore[storeKey]||[])[idx];
  if (!e) return;
  const fmt = d => d ? new Date(d).toISOString().replace(/-|:|\.\d{3}/g,"") : "";
  const start = fmt(e.start);
  const end   = e.end ? fmt(e.end) : fmt(new Date(new Date(e.start).getTime()+3600000));
  const appUrl = `googlecalendar://event?title=${encodeURIComponent(e.summary)}&start=${start}&end=${end}`;
  const webUrl = `https://calendar.google.com/calendar/r/search?q=${encodeURIComponent(e.summary)}`;
  const iframe = document.createElement("iframe");
  iframe.style.display = "none";
  iframe.src = appUrl;
  document.body.appendChild(iframe);
  setTimeout(() => iframe.remove(), 500);
  setTimeout(() => window.open(webUrl, "_blank"), 300);
}

function cleaningSection(dayIdx) {
  const tasks=getDayTasks(dayIdx);
  if (!tasks.length) return `<div class="rest-day"><div class="rest-emoji">🌿</div><div class="rest-title">Rest day</div><div class="rest-sub">No cleaning today</div></div>`;
  const done=tasks.filter(t=>S.checks[`${dayIdx}-${t.id}`]).length;
  const total=tasks.reduce((s,t)=>s+t.mins,0);
  const remaining=tasks.filter(t=>!S.checks[`${dayIdx}-${t.id}`]).reduce((s,t)=>s+t.mins,0);
  const pct=Math.min(100,Math.round(total/60*100));
  const allDone=done===tasks.length;
  let html=`<div class="progress-row">
    <span class="progress-label">${remaining}m left</span>
    <div class="progress-track"><div class="progress-fill${allDone?" done":pct>100?" over":""}" style="width:${pct}%"></div></div>
    <span class="progress-label">${total}m</span>
  </div>`;
  groupByFloor(tasks).forEach(([floor,ft])=>{
    html+=`<div class="inset-header">${FLOOR_NAMES[floor]||"Other"}</div>`;
    ft.forEach(t=>{
      const k=`${dayIdx}-${t.id}`,chk=S.checks[k];
      html+=`<div class="table-row${chk?" checked":""}" onclick="toggleTask(${dayIdx},${t.id})">
        <div class="row-check"><span class="row-check-tick">✓</span></div>
        <div class="row-body">
          <div class="row-label">${t.task}</div>
          <div class="row-sublabel">${t.loc}${t.note?" · "+t.note:""}</div>
        </div>
        <div class="row-detail" style="font-size:14px;color:var(--label3)">${t.mins}m</div>
      </div>`;
    });
  });
  if (allDone) {
    return `<div class="all-done-banner" style="margin:12px;"><div class="all-done-title">✨ All done — house looking great</div></div>`;
  }
  return html;
}

function renderToday() {
  const dayIdx=todayDayIdx();
  const todayEvents=getEventsForDate(new Date());
  const bin=getBinInfo();
  const tasks=getDayTasks(dayIdx);
  const done=tasks.filter(t=>S.checks[`${dayIdx}-${t.id}`]).length;
  let html=`<div class="logo-wrap">${humanjiLogo(false)}<div class="logo-tagline">Daily Family HQ</div></div><div class="large-title-section"><div class="large-title">${new Date().toLocaleDateString("en-GB",{weekday:"long"})}</div><div class="large-subtitle">${WEEK_SCHED[dayIdx].desc}</div></div>`;

  // Calendar
  html+=`<div class="table-group">
    <div class="table-group-header">Schedule</div>
    <div class="table-card">`;
  if (!S.icalUrl) {
    html+=`<div class="setup-cell"><div class="setup-text">Connect your calendar in Settings to see events here.</div><div class="setup-link" onclick="openSettings()">Add calendar →</div></div>`;
  } else {
    html+=calRows(todayEvents,"today");
  }
  html+=`</div></div>`;

  // Bin
  if (bin.urgent) {
    html+=`<div class="table-group">
      <div class="table-group-header">Bins</div>
      <div class="table-card">
        <div class="bin-content">
          <div class="bin-emoji">${bin.recycling?"♻️":"🗑️"}</div>
          <div class="bin-body">
            <div class="row-label">${bin.recycling?"Recycling + food waste":"General waste + food waste"}</div>
            <div class="row-sublabel">${bin.isToday?"Out this morning":"Put out tonight"} · food waste every week</div>
          </div>
          <span class="badge ${bin.isToday?"badge-red":"badge-orange"}">${bin.isToday?"Today":"Tomorrow"}</span>
        </div>
      </div>
    </div>`;
  }

  // Cleaning
  html+=`<div class="table-group">
    <div class="table-group-header" style="display:flex;justify-content:space-between;padding-right:4px">
      <span>Cleaning</span>
      ${tasks.length?`<span style="font-weight:500;color:var(--label2)">${done}/${tasks.length}</span>`:""}
    </div>
    <div class="table-card">${cleaningSection(dayIdx)}</div>
  </div>`;

  // To-dos
  const openTodos=S.todos.filter(t=>!t.done);
  if (openTodos.length) {
    html+=`<div class="table-group">
      <div class="table-group-header">To-do</div>
      <div class="table-card">
        ${openTodos.slice(0,5).map(t=>`<div class="table-row no-indent" onclick="toggleTodo('${t.id}')">
          <div class="row-check"><span class="row-check-tick">✓</span></div>
          <div class="row-body"><div class="row-label">${t.text}</div></div>
        </div>`).join("")}
        ${openTodos.length>5?`<div class="table-row no-indent" onclick="switchTab('todos')"><div class="row-body"><div class="row-label" style="color:var(--blue)">See all ${openTodos.length} →</div></div></div>`:""}
      </div>
    </div>`;
  }

  return html+'<div style="height:8px"></div>';
}

// ─── CLEANING TAB ─────────────────────────────────────────────────────────────
function renderCleaning() {
  const dayIdx=S.activeDay;
  const tasks=getDayTasks(dayIdx);
  const done=tasks.filter(t=>S.checks[`${dayIdx}-${t.id}`]).length;
  let html=`<div class="day-pills">`;
  for(let i=0;i<7;i++){
    const isToday=i===todayDayIdx(),active=i===dayIdx;
    html+=`<div class="day-pill${active?" active":""}${isToday&&!active?" is-today":""}" onclick="selectDay(${i})">${DAY_SHORT[i]}</div>`;
  }
  html+=`</div>`;
  html+=`<div class="table-group">
    <div class="table-group-header" style="display:flex;justify-content:space-between;padding-right:4px">
      <span>${DAY_NAMES[dayIdx]}</span>
      ${tasks.length?`<span style="font-weight:500;color:var(--label2)">${done}/${tasks.length}</span>`:""}
    </div>
    <div class="table-card">${cleaningSection(dayIdx)}</div>
  </div>`;
  return html+'<div style="height:8px"></div>';
}
function selectDay(i){ S.activeDay=i; render(); }

// ─── CALENDAR TAB ─────────────────────────────────────────────────────────────
function renderCalendar() {
  if (!S.icalUrl) return `<div class="table-group"><div class="table-card"><div class="setup-cell" style="padding:24px"><div class="setup-text">Connect your calendar in Settings to see events here.</div><div class="setup-link" onclick="openSettings()">Open Settings →</div></div></div></div>`;

  const syncBar = `<div class="table-group" style="margin-bottom:0"><div class="table-group-header" style="display:flex;justify-content:space-between;padding-right:4px;align-items:center"><span style="color:var(--label3)">${S.calLastFetched ? "Synced "+S.calLastFetched+" &middot; "+S.calEvents.length+" events" : "Tap refresh to load"}</span><span class="sync-btn" onclick="fetchCal(true)">&#8635; Refresh</span></div></div>`;

  const errorBar = S.calError ? `<div class="table-group"><div class="table-card"><div style="padding:14px 16px"><div style="font-size:14px;color:var(--red);margin-bottom:6px">Could not load calendar</div><div style="font-size:13px;color:var(--label2);margin-bottom:10px">${S.calError}</div><span style="font-size:15px;color:var(--blue);font-weight:500;cursor:pointer" onclick="openSettings()">Check Settings</span>&nbsp;&nbsp;<span style="font-size:15px;color:var(--blue);font-weight:500;cursor:pointer" onclick="fetchCal(true)">Retry</span></div></div></div>` : "";

  let html = syncBar + errorBar;
  const today=new Date();
  for(let offset=0;offset<7;offset++){
    const d=new Date(today); d.setDate(today.getDate()+offset);
    const events=getEventsForDate(d);
    const label=offset===0?"Today":offset===1?"Tomorrow":d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"short"});
    if (!events.length&&offset>1) continue;
    html+=`<div class="table-group"><div class="table-group-header">${label}</div><div class="table-card">${calRows(events,"cal_"+offset)}</div></div>`;
  }
  return html+'<div style="height:8px"></div>';
}

// ─── TODOS ────────────────────────────────────────────────────────────────────
function renderTodos() {
  const open=S.todos.filter(t=>!t.done), closed=S.todos.filter(t=>t.done);
  let html=`<div class="table-group">
    <div class="table-group-header">Family to-do</div>
    <div class="table-card">
      <div class="todo-input-row">
        <input class="todo-input" id="todoInput" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTodo()">
        <button class="todo-add-btn" onclick="addTodo()">Add</button>
      </div>
      ${open.map(t=>`<div class="table-row no-indent" onclick="toggleTodo('${t.id}')">
        <div class="row-check"><span class="row-check-tick">✓</span></div>
        <div class="row-body"><div class="row-label">${t.text}</div></div>
        <div class="row-del" onclick="event.stopPropagation();deleteTodo('${t.id}')">−</div>
      </div>`).join("")}
      ${!open.length?`<div class="cal-empty" style="padding:18px">All clear! 🎉</div>`:""}
    </div>
  </div>`;
  if (closed.length) {
    html+=`<div class="table-group">
      <div class="table-group-header" style="display:flex;justify-content:space-between;padding-right:4px"><span>Completed</span><span style="color:var(--red);cursor:pointer;font-size:13px;font-weight:500" onclick="clearDoneTodos()">Clear all</span></div>
      <div class="table-card">
        ${closed.map(t=>`<div class="table-row no-indent checked" onclick="toggleTodo('${t.id}')">
          <div class="row-check"><span class="row-check-tick">✓</span></div>
          <div class="row-body"><div class="row-label">${t.text}</div></div>
          <div class="row-del" onclick="event.stopPropagation();deleteTodo('${t.id}')">−</div>
        </div>`).join("")}
      </div>
    </div>`;
  }
  return html+'<div style="height:8px"></div>';
}
function addTodo(){ const inp=document.getElementById("todoInput"); const v=inp?.value.trim(); if(!v)return; S.todos.unshift({id:Date.now().toString(),text:v,done:false}); saveTodos(); inp.value=""; render(); }
function toggleTodo(id){ const t=S.todos.find(t=>t.id===id); if(t){t.done=!t.done; saveTodos(); render();} }
function deleteTodo(id){ S.todos=S.todos.filter(t=>t.id!==id); saveTodos(); render(); }
function clearDoneTodos(){ S.todos=S.todos.filter(t=>!t.done); saveTodos(); render(); }

function closeSettings(){ document.getElementById("sheetContainer").innerHTML=""; }
function saveIcal(){ const v=document.getElementById("icalInput")?.value.trim(); S.icalUrl=v||""; localStorage.setItem("icalUrl",S.icalUrl); closeSettings(); showToast("Calendar saved — syncing…"); fetchCal(false); }
function clearIcal(){ S.icalUrl=""; S.calEvents=[]; localStorage.setItem("icalUrl",""); closeSettings(); render(); }
async function requestNotif(){ if(!("Notification"in window)){alert("Not supported");return;} const p=await Notification.requestPermission(); if(p==="granted"){S.notifEnabled=true;localStorage.setItem("notifEnabled","true");scheduleNotif();closeSettings();showToast("Reminders on ✓");}else{alert("Denied — enable in Safari settings → this site → Notifications");} }
function saveNotifTime(t){ S.notifTime=t; localStorage.setItem("notifTime",t); scheduleNotif(); }
function scheduleNotif(){ if(!S.notifEnabled)return; if(window._notifTimer)clearTimeout(window._notifTimer); const[h,m]=S.notifTime.split(":").map(Number); const next=new Date(); next.setHours(h,m,0,0); if(next<=new Date())next.setDate(next.getDate()+1); window._notifTimer=setTimeout(()=>{ const tasks=getDayTasks(todayDayIdx()); new Notification("Humanji 🏠",{body:`${tasks.length} tasks today · ${tasks.reduce((s,t)=>s+t.mins,0)} min`}); scheduleNotif(); },next-new Date()); }
function testNotif(){ const tasks=getDayTasks(todayDayIdx()); new Notification("Humanji 🏠",{body:`${tasks.length} tasks today · ${tasks.reduce((s,t)=>s+t.mins,0)} min`}); }
function resetToday(){ const di=todayDayIdx(); getDayTasks(di).forEach(t=>delete S.checks[`${di}-${t.id}`]); saveChecks(); closeSettings(); render(); showToast("Today reset"); }


// ─── WEATHER BACKDROP ENGINE ─────────────────────────────────────────────────
const WX_SCENE = {
  clear:   { day:["#5b9bd5","#a8cdf0","#d4e7f7"], night:["#0a1838","#16264f","#243a66"] },
  cloudy:  { day:["#8fa9c4","#b9cade","#d6e1ec"], night:["#16203a","#222f4d","#33415f"] },
  overcast:{ day:["#9aa6b2","#bcc5cf","#d2d9e0"], night:["#1a1f28","#2a313c","#3a424e"] },
  rain:    { day:["#6b7d91","#8b9bad","#aab7c4"], night:["#121823","#1e2733","#2c3744"] },
  snow:    { day:["#aab6c8","#cdd6e4","#e6ecf4"], night:["#1c2230","#2c3445","#3e4860"] },
  storm:   { day:["#4a5568","#5e6b82","#74829a"], night:["#0d1018","#171c28","#242b3a"] },
  fog:     { day:["#b0b8c0","#c8cfd6","#dde2e7"], night:["#222730","#333a44","#454d58"] },
};

function wxCategory(code) {
  if (code===0||code===1) return "clear";
  if (code===2) return "cloudy";
  if (code===3) return "overcast";
  if (code===45||code===48) return "fog";
  if ([51,53,55,61,63,65,80,81,82].includes(code)) return "rain";
  if ([71,73,75].includes(code)) return "snow";
  if ([95,96,99].includes(code)) return "storm";
  return "cloudy";
}

// returns 'dawn' | 'day' | 'dusk' | 'night' based on local hour
function timeOfDay() {
  const h = new Date().getHours();
  if (h >= 5 && h < 8)  return "dawn";
  if (h >= 8 && h < 18) return "day";
  if (h >= 18 && h < 21) return "dusk";
  return "night";
}

let _wxCanvas, _wxCtx, _wxParticles = [], _wxRAF = null, _wxClouds = [];

function applyWeatherScene() {
  if (!S.weather) return;
  const cat = wxCategory(S.weather.code);
  const tod = timeOfDay();
  const isNight = tod === "night";
  const scene = WX_SCENE[cat] || WX_SCENE.cloudy;
  const palette = isNight ? scene.night : scene.day;

  const bg = document.getElementById("weather-bg");
  const sky = document.getElementById("sky-layer");
  const orb = document.getElementById("sky-orb");
  const lightning = document.getElementById("lightning");
  if (!bg) return;

  // Base gradient
  let grad = `linear-gradient(180deg, ${palette[0]} 0%, ${palette[1]} 55%, ${palette[2]} 100%)`;
  bg.style.background = grad;

  // Dawn / dusk warm tint overlay
  let tint = "transparent";
  if (tod === "dawn") tint = "linear-gradient(180deg, rgba(255,180,120,0.35) 0%, rgba(255,200,150,0.12) 40%, transparent 70%)";
  if (tod === "dusk") tint = "linear-gradient(180deg, rgba(255,140,90,0.30) 0%, rgba(255,120,140,0.15) 45%, transparent 75%)";
  sky.style.background = tint;
  sky.style.opacity = 1;

  // Sun / moon orb
  const showOrb = (cat === "clear" || cat === "cloudy");
  if (showOrb) {
    orb.style.opacity = "1";
    const size = 140;
    orb.style.width = size + "px";
    orb.style.height = size + "px";
    orb.style.left = "62%";
    orb.style.top = isNight ? "14%" : "10%";
    orb.style.animation = "orbDrift 30s ease-in-out infinite";
    if (isNight) {
      orb.style.background = "radial-gradient(circle at 38% 38%, #f4f4ea 0%, #d8d8c8 55%, rgba(216,216,200,0) 72%)";
    } else if (tod === "dawn") {
      orb.style.background = "radial-gradient(circle, rgba(255,225,170,0.95) 0%, rgba(255,200,130,0.5) 45%, rgba(255,200,130,0) 70%)";
    } else if (tod === "dusk") {
      orb.style.background = "radial-gradient(circle, rgba(255,190,140,0.95) 0%, rgba(255,150,110,0.5) 45%, rgba(255,150,110,0) 70%)";
    } else {
      orb.style.background = "radial-gradient(circle, rgba(255,250,220,0.95) 0%, rgba(255,240,190,0.55) 45%, rgba(255,240,190,0) 72%)";
    }
  } else {
    orb.style.opacity = "0";
    orb.style.animation = "none";
  }

  // Lightning flicker for storms
  lightning.style.animation = (cat === "storm") ? "flicker 8s linear infinite" : "none";

  // Drifting clouds (DOM-based, behind cards)
  renderClouds(cat, isNight);

  // Canvas particles (rain / snow)
  startParticles(cat);
}

function renderClouds(cat, isNight) {
  const bg = document.getElementById("weather-bg");
  // clear existing
  bg.querySelectorAll(".cloud").forEach(el => el.remove());
  let count = 0;
  if (cat === "cloudy") count = 3;
  if (cat === "overcast" || cat === "rain" || cat === "storm") count = 5;
  if (cat === "fog") count = 6;
  const opacity = isNight ? 0.25 : (cat === "fog" ? 0.55 : 0.7);
  for (let i = 0; i < count; i++) {
    const cloud = document.createElement("div");
    cloud.className = "cloud";
    const w = 180 + Math.random() * 220;
    cloud.style.width = w + "px";
    cloud.style.height = (w * 0.5) + "px";
    cloud.style.top = (5 + Math.random() * 45) + "%";
    cloud.style.opacity = opacity;
    const dur = 40 + Math.random() * 50;
    const delay = -Math.random() * dur;
    cloud.style.animation = `cloudDrift${(i%2)+1} ${dur}s linear ${delay}s infinite`;
    if (isNight) cloud.style.filter = "brightness(0.6)";
    bg.appendChild(cloud);
  }
}

function startParticles(cat) {
  _wxCanvas = document.getElementById("weather-canvas");
  if (!_wxCanvas) return;
  _wxCtx = _wxCanvas.getContext("2d");
  resizeCanvas();

  const isRain = cat === "rain" || cat === "storm";
  const isSnow = cat === "snow";

  if (!isRain && !isSnow) {
    // no particles — clear and stop
    if (_wxRAF) cancelAnimationFrame(_wxRAF);
    _wxRAF = null;
    _wxCtx.clearRect(0,0,_wxCanvas.width,_wxCanvas.height);
    _wxParticles = [];
    return;
  }

  const W = _wxCanvas.width, H = _wxCanvas.height;
  const count = isRain ? (cat === "storm" ? 220 : 150) : 90;
  _wxParticles = [];
  for (let i = 0; i < count; i++) {
    if (isRain) {
      _wxParticles.push({
        x: Math.random()*W, y: Math.random()*H,
        len: 10 + Math.random()*14,
        speed: 8 + Math.random()*7,
        opacity: 0.15 + Math.random()*0.25,
      });
    } else {
      _wxParticles.push({
        x: Math.random()*W, y: Math.random()*H,
        r: 1.5 + Math.random()*2.5,
        speedY: 0.6 + Math.random()*1.2,
        drift: Math.random()*1.2 - 0.6,
        phase: Math.random()*Math.PI*2,
        opacity: 0.4 + Math.random()*0.4,
      });
    }
  }

  if (_wxRAF) cancelAnimationFrame(_wxRAF);
  const dpr = window.devicePixelRatio || 1;

  function frame() {
    _wxCtx.clearRect(0,0,_wxCanvas.width,_wxCanvas.height);
    if (isRain) {
      _wxCtx.strokeStyle = "rgba(200,215,230,0.5)";
      _wxCtx.lineWidth = 1.1 * dpr;
      _wxParticles.forEach(p => {
        _wxCtx.globalAlpha = p.opacity;
        _wxCtx.beginPath();
        _wxCtx.moveTo(p.x, p.y);
        _wxCtx.lineTo(p.x - 2*dpr, p.y + p.len*dpr);
        _wxCtx.stroke();
        p.y += p.speed * dpr;
        p.x -= 1 * dpr;
        if (p.y > _wxCanvas.height) { p.y = -20; p.x = Math.random()*_wxCanvas.width; }
      });
    } else {
      _wxCtx.fillStyle = "#ffffff";
      _wxParticles.forEach(p => {
        _wxCtx.globalAlpha = p.opacity;
        _wxCtx.beginPath();
        _wxCtx.arc(p.x, p.y, p.r*dpr, 0, Math.PI*2);
        _wxCtx.fill();
        p.y += p.speedY * dpr;
        p.phase += 0.02;
        p.x += Math.sin(p.phase) * p.drift * dpr;
        if (p.y > _wxCanvas.height) { p.y = -10; p.x = Math.random()*_wxCanvas.width; }
      });
    }
    _wxCtx.globalAlpha = 1;
    _wxRAF = requestAnimationFrame(frame);
  }
  frame();
}

function resizeCanvas() {
  if (!_wxCanvas) return;
  const dpr = window.devicePixelRatio || 1;
  _wxCanvas.width = window.innerWidth * dpr;
  _wxCanvas.height = window.innerHeight * dpr;
  _wxCanvas.style.width = window.innerWidth + "px";
  _wxCanvas.style.height = window.innerHeight + "px";
}
window.addEventListener("resize", () => { resizeCanvas(); if (S.weather) startParticles(wxCategory(S.weather.code)); });

// Re-evaluate time-of-day tint every 10 minutes
setInterval(() => { if (S.weather) applyWeatherScene(); }, 10*60*1000);

document.getElementById("navDate").textContent = new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
load(); render(); checkInstall();
if (S.weather) applyWeatherScene();
fetchWeather();

setInterval(() => {
  fetchWeather(false);
  if (S.icalUrl) fetchCal(false);
}, 30000);

// ─── PULL TO REFRESH ─────────────────────────────────────────────────────────
(function() {
  const el = document.getElementById("scrollBody");
  let startY = 0, pulling = false, indicator = null;
  el.addEventListener("touchstart", e => {
    if (el.scrollTop === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, {passive: true});
  el.addEventListener("touchmove", e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 10 && el.scrollTop === 0) {
      if (!indicator) {
        indicator = document.createElement("div");
        indicator.style.cssText = "text-align:center;padding:10px;font-size:13px;color:var(--label3);transition:opacity 0.2s";
        indicator.textContent = "↓ Pull to refresh";
        el.prepend(indicator);
      }
      indicator.textContent = dy > 60 ? "↑ Release to refresh" : "↓ Pull to refresh";
    }
  }, {passive: true});
  el.addEventListener("touchend", e => {
    if (!pulling) return;
    pulling = false;
    const dy = e.changedTouches[0].clientY - startY;
    if (indicator) { indicator.remove(); indicator = null; }
    if (dy > 60) {
      showToast("Refreshing…");
      fetchWeather(true);
      if (S.icalUrl) fetchCal(true);
    }
    startY = 0;
  }, {passive: true});
})();
